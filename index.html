<!DOCTYPE html>

<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Portfolio Joselhin</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- ICONOS -->

  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">

  <!-- CSS -->

  <link rel="stylesheet" href="estilo.css">
</head>

<body>

<!-- MENU -->

<div class="menu">
  <div class="menu-btn" onclick="toggleMenu()">☰</div>

  <div class="menu-items" id="menuItems">
    <a href="#">Inicio</a>
    <a href="#sobre">Sobre mí</a>
    <a href="#proyectos">Proyectos</a>
    <a href="#contacto">Contacto</a>
  </div>
</div>

<!-- PERFIL -->

<section class="perfil">
  <div class="perfil-img">
    <i class="bi bi-person"></i>
  </div>

  <h1>Jose Sánchez</h1>
  <p>Soy estudiante de diseño industrial y me apasiona encontrar soluciones</p>
</section>

<!-- GALERIA -->

<section class="galeria" id="proyectos">

<button class="flecha izquierda" onclick="anterior()">❮</button>

  <div class="contenedor-img">
    <img id="imagen" src="foto1.jpg" alt="proyecto">
  </div>

<button class="flecha derecha" onclick="siguiente()">❯</button>

  <p id="texto">Texto que describe foto</p>

</section>

<!-- SOBRE MI -->

<section id="sobre" class="seccion">
  <h2>Sobre mí</h2>
</section>

<!-- CONTACTO -->

<section id="contacto" class="seccion contacto">
  <h2>Contacto</h2>

  <div class="iconos">
    <i class="bi bi-instagram" onclick="irInstagram()"></i>
    <i class="bi bi-envelope" onclick="enviarMail()"></i>
  </div>

</section>

<script src="script.js"></script>

</body>
</html>
